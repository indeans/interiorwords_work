<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인테리어 시공 용어 디지털 북</title>
    <!-- Tailwind CSS CDN 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 폰트 설정 및 배경 스타일링 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7f9; /* 부드러운 배경색 */
        }
        
        /* 용어 카드 (아코디언 리스트 항목) 스타일 */
        .term-card {
            border-left: 5px solid;
            transition: all 0.2s ease;
            @apply bg-white rounded-xl shadow-lg p-0 cursor-pointer overflow-hidden;
        }
        .official { border-color: #3b82f6; /* Blue */ }
        .slang { border-color: #f59e0b; /* Amber */ }
        
        /* 카테고리 태그 스타일 */
        .category-tag {
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .official-tag { background-color: #dbeafe; color: #1e40af; }
        .slang-tag { background-color: #fef3c7; color: #b45309; }
        
        /* 아코디언 내용 숨기기 */
        .content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding-left: 1rem;
            padding-right: 1rem;
        }
        .expanded .content {
            max-height: 500px; /* 상세 내용이 충분히 보일 높이 */
            transition: max-height 0.5s ease-in;
        }

        /* 필터 버튼 기본 스타일: 캡슐 모양 적용 */
        .filter-btn {
            @apply px-6 py-2 rounded-full font-semibold transition duration-150 border cursor-pointer;
        }

        /* 활성 버튼 색상 오버라이드 */
        .filter-btn-active-all {
            @apply bg-indigo-600 text-white shadow-lg border-transparent hover:bg-indigo-700;
        }
        .filter-btn-active-official {
            @apply bg-blue-600 text-white shadow-lg border-transparent hover:bg-blue-700;
        }
        .filter-btn-active-slang {
            @apply bg-amber-600 text-white shadow-lg border-transparent hover:bg-amber-700;
        }

        /* 섹션 헤더 스타일 */
        .section-header {
            @apply text-xl font-bold mt-8 mb-4 pb-2 border-b-2 flex items-center;
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div id="app" class="max-w-4xl mx-auto">

        <!-- 헤더 및 타이틀 -->
        <header class="text-center mb-8 p-4 bg-white rounded-xl shadow-md">
            <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-800 tracking-tight">
                📐 인테리어 시공 용어 📚
            </h1>
            <p class="text-lg text-gray-500 mt-2">
                표준 용어와 현장 은어가 분리된 디지털 사전 (총 105개)
            </p>
        </header>

        <!-- 검색창 -->
        <div class="mb-6">
            <input type="text" id="search-input" placeholder="찾고 싶은 용어를 입력하세요 (예: 가네, 달대, 덴조)"
                   class="w-full p-4 border-2 border-indigo-200 rounded-xl focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 text-gray-700 shadow-inner transition duration-150">
        </div>

        <!-- 필터 버튼 -->
        <div id="filter-buttons" class="flex justify-center space-x-3 mb-6">
            <button id="filter-all" class="filter-btn">
                전체 보기
            </button>
            <button id="filter-official" data-filter="official" class="filter-btn">
                표준 용어
            </button>
            <button id="filter-slang" data-filter="slang" class="filter-btn">
                현장 은어
            </button>
        </div>

        <!-- 용어 목록 컨테이너 -->
        <div id="glossary-list" class="space-y-8">
            <!-- 섹션들이 여기에 로드됩니다. -->
        </div>

        <!-- 검색 결과 없음 메시지 -->
        <div id="no-results" class="hidden text-center p-8 bg-white rounded-xl shadow-md mt-6">
            <p class="text-xl font-medium text-gray-600">
                🔍 검색 결과가 없습니다. 다른 키워드로 검색해 보세요.
            </p>
        </div>
    </div>

    <script>
        // 용어 데이터 (JSON 형태) - 총 105개 용어
        const termsData = [
            { term: "가네 (가네다)", category: "방향/치수", type: "slang", definition: "'직각(90도)' 또는 '수평'을 뜻하는 일본어 잔재입니다. '가네 맞추다'는 직각을 정확히 맞춘다는 뜻이에요.", example: "코너 부분이 삐뚤어지지 않게 '가네'를 정확하게 잡고 타일을 붙여야 해." },
            { term: "간접등 박스", category: "구조/마감", type: "official", definition: "천장에 조명 기구가 직접 보이지 않도록 박스 형태로 만들어 조명을 숨겨 은은한 빛을 연출하는 구조물입니다. (코브 조명)", example: "거실 벽을 따라 '간접등 박스'를 만들어서 무드 조명을 설치할 계획입니다." },
            { term: "갈바", category: "재료/마감", type: "slang", definition: "아연 도금된 철판(Galvanized Steel)을 뜻하는 은어입니다. 주로 금속 천장재나 복잡한 형태의 마감재를 만들 때 사용됩니다.", example: "이 카운터 상부는 '갈바'로 절곡해서 마감해야 깔끔해." },
            { term: "견출", category: "공정/기술", type: "official", definition: "콘크리트 벽면이나 천장의 거친 면을 끌이나 사포 등으로 곱게 다듬어 평평하고 깔끔하게 만드는 미장 작업의 일종입니다.", example: "노출 콘크리트 인테리어는 '견출' 작업이 정말 중요해. 마감이 전체 분위기를 좌우하거든." },
            { term: "경량철골", category: "구조/가설", type: "official", definition: "천장이나 벽체 골조를 만들 때 사용하는, 얇고 가벼운 철재 부재입니다. 목재 대신 사용되어 내구성과 방화 성능이 우수합니다.", example: "병원 건물의 천장 '천장틀'은 모두 '경량철골'로 시공했습니다." },
            { term: "계단 곰방", category: "자재 운반", type: "slang", definition: "엘리베이터가 없거나 사용이 불가능할 때, 무거운 자재를 사람의 힘으로 직접 들거나 지고 계단을 오르내리며 나르는 일이에요.", example: "이번 현장은 5층까지 '곰방' 작업이 많아서 힘들어." },
            { term: "고데기 (열풍기)", category: "장비/도구", type: "slang", definition: "벽지나 필름을 부착할 때 접착제를 녹이거나 마감재를 가열하여 부드럽게 만드는 데 사용하는 '열풍기(Heat Gun)'를 뜻하는 은어입니다.", example: "필름 마감이 깔끔하게 되도록 '고데기'로 모서리 부분을 녹여 붙여야 해." },
            { term: "골조 마감 ‘면잡기’", category: "공정/기술", type: "official", definition: "콘크리트나 조적 벽체 등 골조의 표면을 반듯하게 평탄화(수직, 수평)하는 작업입니다. '면'을 정확히 '잡는다'는 뜻이에요.", example: "도장 마감을 위해 벽체의 '면잡기'를 아주 정밀하게 요구했습니다." },
            { term: "곰방", category: "자재 운반", type: "slang", definition: "무거운 자재를 사람의 힘으로 직접 들거나 지고 계단을 오르내리며 나르는 고된 노동을 의미합니다.", example: "자재가 너무 많아서 오늘 '곰방'팀을 따로 불렀어." },
            { term: "그라인더", category: "장비/도구", type: "official", definition: "고속으로 회전하는 원형 날을 사용하여 금속, 석재, 타일 등을 자르거나 표면을 갈아내는 전동 공구입니다.", example: "철근을 잘라내야 하니 '그라인더'에 맞는 절단날을 끼워줘." },
            { term: "기리 (기릿대)", category: "장비/도구", type: "slang", definition: "드릴 날이나 송곳처럼 구멍을 뚫는 도구나 그 행위를 뜻하는 일본식 은어입니다. ('드릴링'이나 '천공'으로 순화됨)", example: "여기에 나사를 박기 전에 얇은 '기리'로 먼저 구멍을 내야 해." },
            { term: "기초 정밀측량", category: "공정/기술", type: "official", definition: "건축 초기 단계에서 도면에 맞게 건물의 위치, 높이, 수직, 수평 등을 초정밀 장비를 이용해 정확하게 측정하는 작업입니다.", example: "건물의 오차를 줄이기 위해 착공 전에 '기초 정밀측량'을 다시 실시했습니다." },
            { term: "까대기", category: "현장 문화", type: "slang", definition: "쌓여있는 자재를 분류하거나 짐을 풀고 쌓는 일 등, 단순 반복적이고 힘든 하역 작업을 뜻하는 일본식 은어입니다.", example: "오늘은 시멘트 포대 '까대기' 작업만 하루 종일 했어." },
            { term: "캐링 채널", category: "구조/가설", type: "official", definition: "경량철골 천장 구조에서 '달대'에 의해 수평으로 지지되는 가장 굵은 주된 프레임 부재입니다. 천장틀 구조의 기본 골격이 됩니다.", example: "'캐링 채널'을 먼저 수평하게 설치하고 그 아래에 엠바를 걸어야 해." },
            { term: "컷소 (컷쏘)", category: "장비/도구", type: "official", definition: "앞뒤로 왕복 운동하는 긴 톱날을 이용해 좁은 공간이나 복잡한 형태의 목재, PVC, 금속 등을 자유롭게 자르는 전동 톱입니다.", example: "배관이 지나가는 구멍을 '컷소'로 깔끔하게 잘라내야 해." },
            { term: "콤프레샤 (에어 콤프레서)", category: "장비/도구", type: "official", definition: "공기를 압축하여 저장했다가 필요한 공구(타카, 에어건 등)에 고압의 공기를 공급하는 장치입니다.", example: "타카를 쓰려면 먼저 '콤프레샤'에 공기를 채워야 해." },
            { term: "콘크리트 타설", category: "공정/기술", type: "official", definition: "거푸집 안에 레미콘 트럭으로 운반해 온 액체 상태의 콘크리트를 부어 넣어 구조물의 형태를 만드는 작업입니다.", example: "오늘은 기둥과 보의 '콘크리트 타설'이 예정되어 있으니 안전에 유의해야 해." },
            { term: "나라시", category: "공정/기술", type: "slang", definition: "땅이나 바닥면을 평평하게 고르는 작업을 뜻하는 일본식 은어예요. '평탄화 작업'이라고 순화하는 것이 좋아요.", example: "몰탈(시멘트)을 붓고 '나라시'를 잘해야 바닥이 울퉁불퉁하지 않아." },
            { term: "니빠 (니퍼)", category: "장비/도구", type: "slang", definition: "가는 철사나 전선 등을 자르는 데 사용하는 공구인 '니퍼(Nipper)'를 뜻하는 일본식 은어입니다.", example: "전선이 길어. '니빠'로 끝부분을 잘라내야겠어." },
            { term: "다데 (다데기)", category: "방향/치수", type: "slang", definition: "'세로', '수직(Vertical)'을 뜻하는 일본어 잔재입니다. '다데 맞추다'는 수직을 맞춘다는 뜻이에요.", example: "'다데'가 안 맞아서 벽이 기울어 보이니, 수직을 다시 잡아줘." },
            { term: "다루끼", category: "구조/재료", type: "slang", definition: "가장 흔하게 사용되는 30x30mm 또는 30x40mm 크기의 작은 목재 각재를 뜻하는 일본식 은어입니다.", example: "천장틀 짤 '다루끼'를 넉넉하게 준비해 줘." },
            { term: "단열재", category: "재료/기능", type: "official", definition: "열의 이동을 막아 내부와 외부의 온도 차를 유지해주는 재료입니다. 천장 내부 등에 설치하여 냉난방 효율을 높입니다.", example: "겨울철 난방 효율을 위해 천장 위에 100mm 두께의 '단열재'를 추가했습니다." },
            { term: "달대", category: "구조/가설", type: "official", definition: "콘크리트 천장(슬래브)에 매달려, 그 아래에 설치되는 천장 틀(천장재)의 무게를 지탱하는 수직 부재(봉)입니다.", example: "천장 틀이 처지지 않도록 '달대' 간격을 촘촘하게 설치해야 해." },
            { term: "데모도", category: "인력/직책", type: "slang", definition: "기술자 옆에서 자재 정리, 청소, 보조 작업 등 단순한 일을 돕는 '보조 작업자'를 뜻해요. (일본어에서 유래)", example: "일 배우는 '데모도' 한 명만 더 붙여주시면 작업 속도가 훨씬 빨라질 거예요." },
            { term: "데크플레이트 (Deck Plate)", category: "구조/골조", type: "official", definition: "철골 구조의 바닥 틀(슬래브)을 만들 때 콘크리트 타설 전에 설치하는 강판입니다. 거푸집 역할을 대체합니다.", example: "공사 기간을 줄이기 위해 슬래브 작업에 '데크플레이트' 공법을 적용했다." },
            { term: "덴조", category: "구조/천장", type: "slang", definition: "천장(Ceiling)을 뜻하는 일본식 은어예요. 현장에서는 '천장 공사' 자체를 의미하기도 합니다.", example: "천장 배선 작업 때문에 오늘은 '덴조' 안으로 들어가서 작업해야 해." },
            { term: "도배 초배", category: "공정/기술", type: "official", definition: "마감 벽지를 붙이기 전에 벽이나 천장의 요철을 가리기 위해 미리 바르는 밑바탕 종이(초배지) 작업입니다.", example: "벽이 고르지 않으니 '도배 초배' 작업을 철저히 해야 해." },
            { term: "돔 천장", category: "구조/마감", type: "official", definition: "천장의 일부 또는 전체를 둥근 반구형 모양으로 만들어 입체감과 화려함을 더한 구조입니다.", example: "거실 중앙에 '돔 천장'을 만들어 샹들리에를 설치할 예정입니다." },
            { term: "동바리", category: "구조/가설", type: "official", definition: "콘크리트가 굳을 때까지 무게를 지탱하도록 바닥이나 보 밑에 세우는 임시 지지대(기둥)입니다.", example: "새로 친 천장 슬래브가 무너지지 않도록 '동바리'를 튼튼하게 세워야 해." },
            { term: "디월트컷 (절단기)", category: "장비/도구", type: "official", definition: "각도 조절이 가능하여 목재나 몰딩 등을 원하는 각도로 정밀하게 자를 때 사용하는 전동 공구입니다.", example: "45도 '몰딩 따기'를 위해 '디월트컷'을 세팅해야 해." },
            { term: "라인 잡기", category: "공정/기술", type: "official", definition: "벽체나 가구, 구조물 등이 들어설 정확한 위치와 경계를 기준선(먹줄, 레이저 등)을 이용하여 설정하는 작업입니다.", example: "이쪽에 가벽을 세울 거니까 바닥에 먼저 정확하게 '라인 잡기'를 해줘." },
            { term: "레벨기", category: "장비/도구", type: "official", definition: "레이저나 물방울을 이용해 작업할 면의 정확한 수평이나 수직을 측정하는 장비예요.", example: "'레벨기'로 수평을 맞춘 뒤에 벽걸이 TV를 설치해야 삐뚤어지지 않아." },
            { term: "레이저 거리측정기", category: "장비/도구", type: "official", definition: "레이저를 쏘아 벽체나 구조물 사이의 거리를 정확하고 빠르게 측정하는 전자 장비입니다.", example: "방의 정확한 크기를 재기 위해 '레이저 거리측정기'를 사용하자." },
            { term: "마감", category: "공정/기술", type: "official", definition: "시공의 마지막 단계로, 눈에 보이는 표면을 최종적으로 완성하는 작업이에요.", example: "이제 '마감'만 남았으니 다음 주면 공사가 끝날 것 같아." },
            { term: "마이톤/텍스", category: "재료/마감", type: "official", definition: "사각형 형태의 경량 천장 마감재 패널입니다. 불연성 재료로 만들어지는 경우가 많습니다.", example: "낡은 '텍스' 천장을 뜯어내고 새로운 '마이톤'으로 교체하는 공사입니다." },
            { term: "먹매김 (먹)", category: "공정/기술", type: "official", definition: "기준선이나 위치를 표시하기 위해 먹물을 사용하여 선을 긋는 작업이에요. 도면의 선을 현장에 옮겨 그리는 일입니다.", example: "벽을 세우기 전에 바닥에 정확하게 '먹'을 놓아야 해." },
            { term: "먹줄", category: "공정/기술", type: "official", definition: "먹통에 감긴 실(줄)로, 기준선을 그을 때 사용하는 도구 또는 그 선을 의미합니다.", example: "천장 중앙에 '먹줄'을 튕겨서 중심을 잡아야 해." },
            { term: "메지 (줄눈)", category: "재료/마감", type: "official", definition: "타일이나 벽돌 사이의 틈을 메우는 선이나 그 작업을 뜻하며, 주로 시멘트나 줄눈재를 사용합니다.", example: "타일 시공 후 '메지(줄눈)' 색깔을 뭘로 할지 결정해야 해." },
            { term: "면치기", category: "공정/기술", type: "official", definition: "목재나 석재 등의 재료 모서리를 깎아내어 둥글거나 경사지게 처리하는 마감 작업입니다.", example: "테이블 모서리를 둥글게 '면치기' 해서 안전하게 만들자." },
            { term: "몰딩 따기", category: "공정/기술", type: "official", definition: "벽과 천장 등이 만나는 부분에 몰딩을 설치할 때, 코너 부분이 정확히 맞도록 각을 재단하는 작업입니다.", example: "코너 부분이 뜨지 않도록 몰딩 재료를 45도로 '몰딩 따기' 해야 해." },
            { term: "몰탈", category: "재료/마감", type: "official", definition: "시멘트와 모래에 물을 섞어 만든 반죽 재료입니다. 바닥을 평평하게 미장할 때 사용됩니다.", example: "타일을 붙이기 전에 바닥 '몰탈' 면을 깔끔하게 정리해야 해." },
            { term: "목작업 ‘따내기’", category: "공정/기술", type: "official", definition: "재료를 시공할 때 장애물 모양에 맞춰 재료의 일부를 정교하게 잘라내는 작업입니다.", example: "콘센트 위치에 맞게 석고보드를 정확히 '따내기' 해야 마감이 깨끗해." },
            { term: "목틀 (천장/벽체)", category: "구조/골조", type: "official", definition: "석고보드 등의 마감재를 부착하기 위해 나무 각재로 미리 짜 놓는 기본적인 뼈대 구조물입니다.", example: "간접조명을 넣기 위해 천장에 '목틀'을 'ㄷ'자 형태로 짜야 해." },
            { term: "물타기", category: "현장 문화", type: "slang", definition: "약속한 금액보다 적게 주거나, 재료의 품질이나 양을 줄여서 작업하는 행위를 비꼬아 부르는 은어입니다.", example: "시멘트 비율을 너무 낮춰서 벽에 금이 갔어. 완전히 '물타기' 한 거 아니야?" },
            { term: "미장", category: "공정/기술", type: "official", definition: "시멘트 몰탈 등을 벽이나 바닥에 발라 표면을 평평하고 매끄럽게 하는 작업입니다.", example: "바닥에 '미장'을 꼼꼼히 해서 수평을 잡고 타일을 붙이자." },
            { term: "바닥 레벨링", category: "공정/기술", type: "official", definition: "바닥면의 높낮이 차이를 없애고 완전히 수평하게 만드는 작업입니다.", example: "강화마루를 깔기 전에 바닥이 평평해야 하니 '바닥 레벨링'을 필수로 해야 해." },
            { term: "반생", category: "재료/고정", type: "slang", definition: "철근을 묶거나 천장 '달대'를 고정할 때 사용하는 부드러운 철선(소둔철선)을 뜻하는 일본식 은어입니다.", example: "달대와 캐링 채널을 튼튼하게 고정하려면 '반생'으로 잘 묶어줘야 해." },
            { term: "반자/반자돌림", category: "구조/마감", type: "official", definition: "천장 주변의 벽과 천장이 만나는 부분에 둘러대는 몰딩이나 띠장재를 말합니다.", example: "천장 끝부분에 '반자돌림' 몰딩을 설치해서 깔끔하게 마감하자." },
            { term: "방화 보드", category: "재료/마감", type: "official", definition: "불에 잘 타지 않는 특수한 재료로 만든 판재입니다. 피난 통로 등의 천장 마감재로 사용됩니다.", example: "지하 주차장 천장은 의무적으로 '방화 보드'로 마감해야 합니다." },
            { term: "배관 트랩", category: "설비/배관", type: "official", definition: "하수구에서 올라오는 악취나 해충을 막기 위해 배관 중간에 물이 고이게 만든 구조물입니다.", example: "하수구 냄새가 올라오지 않도록 '배관 트랩'이 정상적으로 설치되었는지 확인해야 해." },
            { term: "배관 피팅 작업", category: "공정/기술", type: "official", definition: "파이프의 방향을 바꾸거나 연결하는 등 배관 부속품(피팅)을 결합하는 작업입니다.", example: "복잡한 곡선 구간은 '배관 피팅 작업'을 정밀하게 해야 누수가 없어." },
            { term: "보양 (保養)", category: "공정/안전", type: "official", definition: "시공된 부분이 손상되거나 오염되지 않도록 비닐, 박스 등으로 덮어 보호하는 작업이에요.", example: "바닥 타일이 손상되지 않게 박스로 철저히 '보양'해야 해." },
            { term: "부직포", category: "재료/마감", type: "official", definition: "섬유를 압축하여 만든 천으로, 도배 시 벽면의 요철을 감추기 위한 초배지로 사용됩니다.", example: "벽이 울퉁불퉁하니 '부직포'를 먼저 바르고 그 위에 벽지를 덮어야 해." },
            { term: "브라켓 (Bracket)", category: "재료/기술", type: "official", definition: "벽이나 기둥에 선반 등을 지지하기 위해 부착하는 받침대 형태의 철물입니다.", example: "무거운 선반을 고정하기 위해 튼튼한 '브라켓'을 사용해야 해." },
            { term: "비계", category: "구조/가설", type: "official", definition: "높은 곳의 작업을 위해 임시로 설치하는 구조물(발판)입니다.", example: "외벽 페인트칠을 하려면 먼저 건물 주변에 '비계'를 설치해야 해." },
            { term: "빠루", category: "장비/도구", type: "slang", definition: "못을 뽑거나 물체를 들어 올리는 데 사용하는 '쇠 지렛대'를 뜻하는 일본식 은어예요.", example: "이 못은 망치로 안 되니 '빠루'를 가져와서 뽑아야겠어." },
            { term: "산승각", category: "구조/재료", type: "slang", definition: "큰 구조를 짤 때 사용하는 굵은 목재 각재(약 90x90mm)를 뜻하는 일본식 은어입니다.", example: "지붕 하중을 받으려면 가는 '다루끼' 말고 '산승각'을 써야 버텨." },
            { term: "샌딩 (연마)", category: "공정/기술", type: "official", definition: "표면을 사포 등으로 문질러 매끄럽게 만드는 작업입니다.", example: "오일스테인 바르기 전에 목재 표면을 '샌딩(연마)'해서 거친 부분을 없애야 해." },
            { term: "석고보드", category: "재료/마감", type: "official", definition: "벽이나 천장에 가장 흔하게 사용되는 판재로, 시공성과 방화성이 우수합니다.", example: "천장 틀에 '석고보드'를 두 겹으로 붙여서 방음 성능을 높였습니다." },
            { term: "설비 선행공정", category: "공정/기술", type: "official", definition: "전기, 수도 등 설비 작업이 마감 전에 미리 완료되어야 하는 초기 단계 작업입니다.", example: "벽체 마감 전에 전기 배선은 반드시 '설비 선행공정'으로 끝내야 합니다." },
            { term: "슈미", category: "마감/디테일", type: "slang", definition: "'줄눈' 또는 '틈'을 메우는 마감 작업을 뜻하는 일본식 은어예요.", example: "타일 틈새 '슈미'를 실리콘으로 깨끗하게 마무리해주세요." },
            { term: "스팬드럴", category: "재료/마감", type: "official", definition: "알루미늄이나 강판으로 만든 띠 모양의 천장 마감재를 말합니다.", example: "외부 캐노피 하부 천장에 금속 재질의 '스팬드럴'을 사용했습니다." },
            { term: "스페이서 (Spacer)", category: "구조/골조", type: "official", definition: "철근이 거푸집 바닥에 닿지 않도록 간격을 유지시켜 주는 받침대입니다.", example: "철근 아래에 '스페이서'를 넣어서 철근이 콘크리트 중앙에 오도록 해야 해." },
            { term: "슬리브 (Sleeve)", category: "공정/기술", type: "official", definition: "벽이나 바닥에 배관이 통과할 공간을 미리 확보하기 위해 삽입하는 통로입니다.", example: "벽을 치기 전에 급수관이 통과할 자리에 '슬리브'를 묻어놔야 해." },
            { term: "시마이", category: "현장 문화", type: "slang", definition: "작업이나 공정을 '마무리', '종료' 또는 '끝'낸다는 뜻의 일본식 은어입니다.", example: "오늘 '천장 목틀' 작업은 이제 '시마이'하고 정리하자." },
            { term: "십장 (오야지)", category: "인력/직책", type: "slang", definition: "현장에서 해당 공종을 책임지고 작업자들을 관리하는 '작업 반장'을 낮춰 부르는 말이에요.", example: "'십장'님이 오셔야 오늘 작업 지시를 받을 수 있어." },
            { term: "실리콘 마감", category: "재료/마감", type: "official", definition: "방수 및 마감 처리를 위해 실리콘 재료를 틈새에 채워 넣는 작업입니다.", example: "싱크대 상판과 벽이 만나는 부분은 깨끗하게 '실리콘 마감'을 해야 해." },
            { term: "앙카 (앵커)", category: "재료/기술", type: "official", definition: "벽이나 바닥에 무거운 물체를 고정하기 위해 삽입하는 볼트 형태의 부품입니다.", example: "무거운 에어컨 실외기는 반드시 벽에 '앙카(앵커)'로 고정해야 안전해." },
            { term: "야리끼리", category: "현장 문화", type: "slang", definition: "정해진 작업량을 채우면 시간이 남았더라도 퇴근하는 방식이에요.", example: "오늘은 날씨가 더우니 오전에 '야리끼리'하고 쉬자." },
            { term: "양중 (揚重)", category: "자재 운반", type: "official", definition: "무거운 자재를 트럭에서 현장이나 위층으로 들어 올리거나 운반하는 모든 작업이에요.", example: "석고보드가 너무 많아서 오늘은 '양중' 작업에 시간이 많이 걸릴 거야." },
            { term: "엠바 (M-Bar)", category: "구조/가설", type: "official", definition: "천장 마감재를 직접 부착하는 경량철골 중간 뼈대 부재입니다.", example: "석고보드를 '엠바'에 나사로 고정하면 됩니다." },
            { term: "오야 (수직·기준점)", category: "방향/치수", type: "slang", definition: "현장에서 모든 작업의 기준이 되는 중심선이나 수직선(원점)을 뜻합니다.", example: "'오야(기준점)'를 중심으로 1미터씩 간격을 띄워서 작업하세요." },
            { term: "우레탄 코킹", category: "재료/마감", type: "official", definition: "창틀이나 이음새 부분에 방수를 목적으로 실링재를 채워 넣는 작업입니다.", example: "베란다 창틀에 빗물이 새지 않도록 '우레탄 코킹' 작업을 다시 해야겠어." },
            { term: "우마", category: "장비/가설", type: "slang", definition: "높은 곳에서 작업하기 위해 사용하는 '말'처럼 생긴 이동식 작업 발판입니다.", example: "'우마'가 없으면 천장 작업이 힘드니 높이에 맞는 걸로 가져와." },
            { term: "우물 천장", category: "구조/마감", type: "official", definition: "중앙 부분을 주변보다 높게 단차를 주어 입체적인 '우물' 모양처럼 만든 천장 구조입니다.", example: "'우물 천장' 테두리에 LED 간접 조명을 넣어 분위기를 살렸습니다." },
            { term: "유니트 바닥", category: "구조/시스템", type: "official", definition: "공장에서 미리 제작된 모듈형 바닥 패널입니다.", example: "공기를 단축시키기 위해 욕실은 '유니트 바닥' 시스템을 적용했습니다." },
            { term: "이음매", category: "공정/기술", type: "official", definition: "두 자재가 만나는 선이나 연결 부분을 의미합니다.", example: "천장 석고보드의 '이음매'를 퍼티로 잘 메워야 해." },
            { term: "임팩트 드라이버", category: "장비/도구", type: "official", definition: "나사를 박을 때 순간적인 충격을 가해 강력하게 작업하는 전동 공구입니다.", example: "긴 나사는 일반 드릴로 어려우니 '임팩트 드라이버'를 써서 박아." },
            { term: "입회", category: "현장 관리", type: "official", definition: "중요 시점에 발주자나 감리자가 현장에 직접 참석하여 시공을 확인하는 일이에요.", example: "배관 공사 후 꼭 감리팀의 '입회'를 받아야 해요." },
            { term: "잡다", category: "현장 은어", type: "slang", definition: "수평, 수직, 면 등의 기준을 정확하고 정밀하게 맞추라는 현장 지시입니다.", example: "문틀 설치 전에 바닥 레벨을 '정확히 잡고' 나서 작업해야 해." },
            { term: "잡석다짐", category: "공정/기술", type: "official", definition: "기초 전 땅 위에 깬 돌(잡석)을 깔고 다져서 지반을 안정시키는 작업입니다.", example: "터파기 후에는 반드시 '잡석다짐'을 튼튼하게 해야 기초가 내려앉지 않아." },
            { term: "잡석층", category: "구조/기초", type: "official", definition: "기초 아래쪽에 지반 안정과 습기 방지를 위해 자갈이나 돌을 채운 층입니다.", example: "지하층 습기를 막기 위해 '잡석층'을 두껍게 깔아야 해." },
            { term: "장선", category: "구조/골조", type: "official", definition: "바닥이나 천장 널판지를 지지하기 위해 보 사이에 건너지르는 부재입니다.", example: "데크 바닥에 하중을 분산시키기 위해 '장선'을 촘촘하게 설치했어요." },
            { term: "전등박스 매립", category: "공정/기술", type: "official", definition: "조명 기구를 위해 벽이나 천장 속에 배선 박스를 묻어 넣는 작업입니다.", example: "천장 '전등박스 매립' 위치가 도면과 맞는지 확인해." },
            { term: "점검구", category: "공정/기술", type: "official", definition: "천장 내부 등을 보수하기 위해 만들어 놓는 작은 문입니다.", example: "누수에 대비해서 천장 구석에 '점검구'를 만들어 놓자." },
            { term: "집성목", category: "재료/마감", type: "official", definition: "여러 목재 조각을 붙여 만든 나무로, 변형이 적어 천장재나 가구재로 쓰입니다.", example: "천장에 노출된 '집성목' 보에 바니시를 칠해서 마감하자." },
            { term: "찍힘", category: "현장 은어", type: "slang", definition: "마감재 표면이 충격으로 인해 작게 파이거나 흠집이 생긴 상태입니다.", example: "새로 칠한 벽에 '찍힘'이 생기지 않도록 조심해." },
            { term: "천고", category: "치수/구조", type: "official", definition: "바닥면에서부터 천장(마감면)까지의 수직 높이입니다.", example: "이 사무실의 '천고'는 2.8미터로 일반적인 높이보다 조금 높다." },
            { term: "천공기 (핸드드릴)", category: "장비/도구", type: "official", definition: "벽이나 목재에 구멍을 뚫는 데 사용하는 전동 공구입니다.", example: "선반을 달기 위해 벽에 '천공기'로 구멍을 먼저 뚫어야 해." },
            { term: "천장 구루마", category: "장비/가설", type: "slang", definition: "천장 마감재를 들고 천장틀에 부착할 때 쓰는 수레나 운반 도구입니다.", example: "석고보드를 천장에 붙일 때는 '천장 구루마'를 이용해야 편해." },
            { term: "천장 뜯기", category: "공정/철거", type: "official", definition: "리모델링 시 기존의 천장 마감재와 뼈대를 해체하고 제거하는 작업입니다.", example: "내부 배관을 확인하기 위해 '천장 뜯기'부터 시작합시다." },
            { term: "천장 매입등 하우징", category: "재료/기술", type: "official", definition: "천장에 조명을 묻어 넣을 때 조명 기구가 들어갈 공간을 확보하는 틀입니다.", example: "다운라이트 설치를 위해 '하우징' 위치를 먼저 잡아야 해." },
            { term: "천장 환기구/디퓨저", category: "설비/마감", type: "official", definition: "환기나 에어컨 바람을 내보내는 천장 표면의 마감 장치입니다.", example: "새로운 '천장 환기구'를 설치해서 공기 순환을 개선해야 해." },
            { term: "천장틀", category: "구조/골조", type: "official", definition: "천장 마감재를 부착하기 위해 설치하는 나무나 철골 뼈대 전체를 말합니다.", example: "간접 조명을 위해 '천장틀'을 새로 짜야 합니다." },
            { term: "타가 (스테이플러)", category: "장비/도구", type: "slang", definition: "핀을 박는 공구를 총칭하는 은어로, 목공 작업에서 빠르게 핀을 박을 때 사용합니다.", example: "가벽을 세우려면 '타카'로 각재를 빠르게 고정해야 해." },
            { term: "타정총 (콘크리트 네일건)", category: "장비/도구", type: "official", definition: "콘크리트나 철재에 강력한 힘으로 못을 박는 전동/가스 공구입니다.", example: "이 벽은 너무 단단해서 망치질이 안 되니 '타정총'을 써야 해." },
            { term: "털어내기", category: "현장 은어", type: "slang", definition: "잘못된 부분을 해체하고 처음부터 다시 작업하라는 지시입니다.", example: "마감이 엉망이니 전부 '털어내기'하고 내일 다시 시작하세요." },
            { term: "트러스", category: "구조/골조", type: "official", definition: "삼각형 형태로 연결하여 넓은 천장을 지지하는 구조물입니다.", example: "체육관처럼 큰 공간의 지붕은 주로 '트러스' 구조로 지지됩니다." },
            { term: "퍼티 (Putty)", category: "재료/마감", type: "official", definition: "표면에 생긴 구멍이나 틈새를 메워 평평하게 만드는 반죽 재료입니다.", example: "페인트칠을 깔끔하게 하려면 '퍼티' 작업을 여러 번 해야 해." },
            { term: "폼타이 (Form Tie)", category: "구조/가설", type: "official", definition: "콘크리트 타설 시 거푸집이 벌어지지 않도록 고정하는 철물입니다.", example: "'폼타이'를 촘촘하게 설치해야 거푸집이 터지지 않아." },
            { term: "피스", category: "재료/고정", type: "slang", definition: "나사못을 뜻하는 은어입니다. 전동 드라이버로 박아 고정할 때 사용합니다.", example: "석고보드가 뜨지 않도록 '피스'를 더 박아서 고정시켜야 해." },
            { term: "하스리", category: "공정/철거", type: "slang", definition: "콘크리트를 깨거나 부수어 일부를 깎아내는 파괴/철거 작업을 뜻해요.", example: "벽에 구멍을 내서 창문을 키우려면 '하스리' 작업이 필요해." },
            { term: "함바 (함바집)", category: "현장 문화", type: "slang", definition: "공사 현장 안에 설치된 임시 식당이나 배달 업체를 뜻해요.", example: "오늘은 '함바'에서 김치찌개가 나온대." },
            { term: "합지", category: "재료/마감", type: "official", definition: "종이를 겹쳐 만든 벽지로, 가장 일반적인 도배지 종류 중 하나입니다.", example: "예산 문제로 실크 벽지 대신 '합지' 벽지를 선택했어요." },
            { term: "해머드릴", category: "장비/도구", type: "official", definition: "단단한 콘크리트에 타격과 회전을 동시에 주어 구멍을 뚫는 공구입니다.", example: "이 콘크리트 벽에는 '해머드릴'을 써야 구멍이 뚫려." },
            { term: "행거 볼트", category: "장비/도구", type: "official", definition: "부재를 천장에 고정할 때 사용하는 고리 모양의 특수 볼트입니다.", example: "'행거 볼트'로 달대를 천장에 단단하게 매달아야 해." },
            { term: "후레임", category: "구조/골조", type: "slang", definition: "벽이나 천장의 뼈대 구조물(Frame) 전체를 통칭하는 은어입니다.", example: "'후레임'이 튼튼해야 위에 마감재를 붙였을 때 처지지 않아." }
        ];

        const glossaryList = document.getElementById('glossary-list');
        const searchInput = document.getElementById('search-input');
        const noResults = document.getElementById('no-results');
        const filterButtonsContainer = document.getElementById('filter-buttons');
        const allBtn = document.getElementById('filter-all');
        const officialBtn = document.getElementById('filter-official');
        const slangBtn = document.getElementById('filter-slang');

        let currentFilter = 'all'; // 'all', 'official', 'slang'

        // 함수: 데이터 정렬 (가나다 순)
        function sortData() {
            termsData.sort((a, b) => a.term.localeCompare(b.term, 'ko'));
        }

        // 함수: 활성 필터 버튼 디자인 적용
        function updateFilterButtons(activeFilter) {
            const allButtons = [allBtn, officialBtn, slangBtn];
            
            allButtons.forEach(btn => {
                const isAll = btn.id === 'filter-all';
                const isOfficial = btn.id === 'filter-official';
                const isSlang = btn.id === 'filter-slang';
                
                btn.className = 'filter-btn';
                
                if ((isAll && activeFilter === 'all') || (isOfficial && activeFilter === 'official') || (isSlang && activeFilter === 'slang')) {
                    if (isAll) btn.classList.add('filter-btn-active-all');
                    else if (isOfficial) btn.classList.add('filter-btn-active-official');
                    else if (isSlang) btn.classList.add('filter-btn-active-slang');
                } else {
                    btn.classList.add('bg-white', 'shadow-sm');
                    if (isAll) btn.classList.add('text-gray-600', 'border-gray-300', 'hover:bg-gray-50');
                    else if (isOfficial) btn.classList.add('border-blue-500', 'text-blue-600', 'hover:bg-blue-50');
                    else if (isSlang) btn.classList.add('border-amber-500', 'text-amber-600', 'hover:bg-amber-50');
                }
            });
        }

        // 함수: 용어 카드 생성
        function createTermCard(item) {
            const card = document.createElement('div');
            const typeClass = item.type === 'official' ? 'official' : 'slang';
            const tagClass = item.type === 'official' ? 'official-tag' : 'slang-tag';
            const typeLabel = item.type === 'official' ? '표준 용어' : '현장 은어';
            
            card.className = `term-card ${typeClass}`;
            card.onclick = () => card.classList.toggle('expanded');

            card.innerHTML = `
                <div class="header p-4 flex justify-between items-center hover:bg-gray-50 transition duration-150">
                    <div class="flex items-center">
                        <span class="text-xl font-bold text-gray-800 mr-3">${item.term}</span>
                        <span class="category-tag bg-indigo-100 text-indigo-700">${item.category}</span>
                    </div>
                    <div class="flex items-center">
                        <span class="category-tag ${tagClass} mr-3">${typeLabel}</span>
                        <svg class="w-5 h-5 text-gray-500 transform transition-transform duration-300" 
                             xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </div>
                <div class="content p-4 pt-0">
                    <div class="border-t border-gray-100 mt-2 pt-4 space-y-3">
                        <p class="text-gray-700 leading-relaxed">
                            <span class="font-semibold text-blue-600">📌 정의:</span> ${item.definition}
                        </p>
                        <p class="text-gray-600 italic bg-gray-50 p-3 rounded-lg border border-gray-100">
                            <span class="font-semibold text-red-600">💬 예시:</span> ${item.example}
                        </p>
                    </div>
                </div>
            `;
            return card;
        }

        // 함수: 렌더링 (용어와 은어 섹션 분리)
        function renderGlossary(filterText = '', typeFilter = currentFilter) {
            glossaryList.innerHTML = '';
            const lowerCaseFilter = filterText.toLowerCase().trim();
            
            updateFilterButtons(typeFilter);

            // 데이터를 두 그룹으로 분리
            const officialList = termsData.filter(item => 
                item.type === 'official' && 
                (lowerCaseFilter === '' || item.term.toLowerCase().includes(lowerCaseFilter) || item.definition.toLowerCase().includes(lowerCaseFilter))
            );
            const slangList = termsData.filter(item => 
                item.type === 'slang' && 
                (lowerCaseFilter === '' || item.term.toLowerCase().includes(lowerCaseFilter) || item.definition.toLowerCase().includes(lowerCaseFilter))
            );

            let hasResults = false;

            // 표준 용어 섹션 렌더링
            if ((typeFilter === 'all' || typeFilter === 'official') && officialList.length > 0) {
                const section = document.createElement('div');
                section.innerHTML = `<h2 class="section-header border-blue-200 text-blue-800">
                    <span class="mr-2">📘</span> 표준 용어 (${officialList.length})
                </h2>`;
                const listContainer = document.createElement('div');
                listContainer.className = "space-y-4";
                officialList.forEach(item => listContainer.appendChild(createTermCard(item)));
                section.appendChild(listContainer);
                glossaryList.appendChild(section);
                hasResults = true;
            }

            // 현장 은어 섹션 렌더링
            if ((typeFilter === 'all' || typeFilter === 'slang') && slangList.length > 0) {
                const section = document.createElement('div');
                section.innerHTML = `<h2 class="section-header border-amber-200 text-amber-800">
                    <span class="mr-2">📙</span> 현장 은어 (${slangList.length})
                </h2>`;
                const listContainer = document.createElement('div');
                listContainer.className = "space-y-4";
                slangList.forEach(item => listContainer.appendChild(createTermCard(item)));
                section.appendChild(listContainer);
                glossaryList.appendChild(section);
                hasResults = true;
            }

            if (!hasResults) noResults.classList.remove('hidden');
            else noResults.classList.add('hidden');
        }

        // 이벤트 리스너
        searchInput.addEventListener('input', (e) => renderGlossary(e.target.value, currentFilter));
        
        filterButtonsContainer.addEventListener('click', (e) => {
            const button = e.target.closest('.filter-btn');
            if (!button) return;
            currentFilter = button.id === 'filter-all' ? 'all' : button.dataset.filter;
            renderGlossary(searchInput.value, currentFilter); 
        });

        // 초기 실행
        window.onload = () => {
            sortData(); // 가나다 순 정렬 실행
            renderGlossary();
        };

    </script>
</body>
</html>
